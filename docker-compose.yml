services:
  train:
    build: .
    volumes:
      - ./artifacts:/app/artifacts
      - ./keis7-main:/app/keis7-main:ro
    command: ["src.train"]

  predict:
    build: .
    volumes:
      - ./artifacts:/app/artifacts
      - ./keis7-main:/app/keis7-main:ro
    command: ["src.predict"]
    depends_on:
      - train

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./artifacts:/app/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////app/artifacts/mlflow.db
      --default-artifact-root /app/artifacts/mlartifacts
